<!DOCTYPE html>

<html>
<head>
<title>Health Records</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1588776814546-ec7e5c8c0f7b");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

.header{
text-align:center;
color:white;
padding:20px;
font-size:28px;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
background:#ff3b3b;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

.container{
width:90%;
margin:30px auto;
background:rgba(255,255,255,0.95);
border-radius:12px;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#00d4ff;
color:white;
}

.good{color:green;font-weight:bold;}
.bad{color:red;font-weight:bold;}

</style>

</head>

<body>

<button class="back-btn" onclick="goBack()">← Back</button>

<div class="header">Previous Health Records</div>

<div class="container">

<table>

<tr>
<th>S.No</th>
<th>Username</th>
<th>Temperature</th>
<th>Heart Rate</th>
<th>Sleep</th>
<th>Fatigue</th>
<th>Status</th>
</tr>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

function goBack(){
window.location.href="dashboard.html";
}

let userId = localStorage.getItem("userId");

if(!userId){
alert("Please login first");
window.location.href="login.html";
}

/* FETCH DATA */
fetch("http://localhost:8080/api/health/history/" + userId)
.then(res=>res.json())
.then(data=>{

let table = document.getElementById("tableBody");
table.innerHTML="";

if(data.length === 0){
table.innerHTML = "<tr><td colspan='7'>No records found</td></tr>";
return;
}

data.forEach((rec,index)=>{

table.innerHTML += `
<tr>
<td>${index+1}</td>
<td>${localStorage.getItem("username")}</td>
<td>${rec.temperature}</td>
<td>${rec.heartRate}</td>
<td>${rec.sleepHours}</td>
<td>${rec.fatigueLevel}</td>
<td class="${rec.status==='Normal'?'good':'bad'}">${rec.status}</td>
</tr>
`;

});

})
.catch(()=>{
alert("Error loading records");
});

</script>
</body>
</html>
