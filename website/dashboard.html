<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>

/* REMOVE CLICK BLOCKING */
.overlay{
pointer-events:none;
z-index:0;
}

.top-bar{
position:fixed;
top:0;
left:0;
right:0;              /* ✅ IMPORTANT FIX */
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
z-index:1000;
box-sizing:border-box;  /* ✅ PREVENT OVERFLOW */
}
.top-btn{
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.top-btn:hover{
color:#00d4ff;
}

/* DROPDOWN CENTER */
.nav-center{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:1000;
color:white;
font-weight:bold;
}

.dropdown{
position:relative;
display:inline-block;
cursor:pointer;
}

.dropdown{
position:relative;
display:inline-block;
cursor:pointer;
padding-bottom:15px; /* 🔥 IMPORTANT FIX */
}

.dropdown-content{
display:none;
position:absolute;
top:35px;
left:-40px;
background:white;
color:black;
border-radius:8px;
width:180px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
padding:5px 0;
}

/* 🔥 KEEP DROPDOWN OPEN */
.dropdown:hover .dropdown-content,
.dropdown-content:hover{
display:block;
}
.menu-item{
padding:10px;
cursor:pointer;
}

.menu-item:hover{
background:#00d4ff;
color:white;
}

/* SHOW DROPDOWN */
.dropdown:hover .dropdown-content{
display:block;
}

/* CENTER CONTENT */
.center-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:2;
}

.center-content h1{
font-size:40px;
}

.center-content p{
font-size:18px;
margin-top:10px;
}

/* WELCOME */
.welcome-text{
position:absolute;
top:100px;
width:100%;
text-align:center;
color:white;
font-size:28px;
font-weight:600;
z-index:2;
animation:fadeIn 1.5s ease;
}

.welcome-text span{
color:#00d4ff;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- TOP BAR -->
<div class="top-bar">
<div class="top-btn" onclick="goHelp()">Help</div>
<div class="top-btn" onclick="logoutUser()">Logout</div>
</div>

<!-- CENTER NAV -->
<div class="nav-center">
<div class="dropdown">
Home ▼
<div class="dropdown-content">
<div class="menu-item" onclick="go('health.html')">Check Health</div>
<div class="menu-item" onclick="go('history.html')">View Records</div>

</div>
</div>
</div>

<!-- MAIN CONTENT -->
<div class="center-content">
<h1>Health Monitoring & Alert System</h1>
<p>
"Your health is your greatest wealth. Regular monitoring can save your life and improve your future."
</p>
</div>

<!-- WELCOME -->
<div class="welcome-text">
Hi, <span id="userName"></span>! 👋
</div>

<script>

/* USERNAME */
document.getElementById("userName").innerText =
localStorage.getItem("username") || "User";

/* NAVIGATION */
function go(page){
window.location.href = page;
}

/* HELP */
function goHelp(){
window.location.href = "help.html";
}

/* LOGOUT */
function logoutUser(){
localStorage.clear();
window.location.href = "login.html";
}

</script>

</body>
</html>
