<!DOCTYPE html>
<html>
<head>
<title>Help</title>
<link rel="stylesheet" href="style.css">

<style>

/* SAME BACKGROUND (DOCTORS IMAGE) */
body{
margin:0;
font-family:Arial, sans-serif;

background-image:url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

/* CENTER CARD */
.help-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
width:500px;
border-radius:15px;
text-align:left;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
animation:fadeIn 1s ease;
z-index:2;
}

/* TITLE */
.help-container h1{
text-align:center;
margin-bottom:20px;
}

/* LIST */
.help-container ol{
line-height:1.8;
font-size:16px;
}

/* BUTTON */
.back-btn{
margin-top:20px;
display:block;
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#00d4ff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.back-btn:hover{
background:#009ec3;
transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translate(-50%,-60%);}
to{opacity:1; transform:translate(-50%,-50%);}
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="help-container">

<h1>Help - Health Monitoring System</h1>

<ol>
<li>Login using your registered account.</li>
<li>Go to <b>"Check Health"</b> and enter your health details.</li>
<li>View your records in <b>"History"</b>.</li>
<li>Track your improvement in <b>"Progress"</b>.</li>
<li>Click <b>"Logout"</b> when you are done.</li>
</ol>

<button class="back-btn" onclick="goBack()">⬅ Go Back</button>

</div>

<script>
function goBack(){
window.location.href="dashboard.html";
}
</script>

</body>
</html>
