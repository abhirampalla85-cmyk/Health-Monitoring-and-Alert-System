<!DOCTYPE html>
<html>
<head>
<title>Health Check</title>

<style>
body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1576091160550-2173dba999ef");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.main-title{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:28px;
z-index:1000;
width:100%;
text-align:center;
}

.container{
width:90%;
max-width:900px;
margin:120px auto;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
justify-items:center;
}

.full{
grid-column:2/3;
}

.card{
background:rgba(255,255,255,0.95);
padding:15px;
border-radius:12px;
width:220px;
text-align:center;
}

.card img{
width:100px;
height:100px;
object-fit:contain;
}

.card input{
width:90%;
margin-top:10px;
padding:8px;
border:none;
border-radius:5px;
text-align:center;
}

button{
margin-top:30px;
padding:12px 40px;
background:#ff3b3b;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:350px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
z-index:2000;
}

.popup-header{
background:#e0e7ef;
padding:15px;
font-weight:bold;
font-size:20px;
}

.popup-body{
padding:20px;
font-size:16px;
}

.popup-footer{
text-align:center;
padding-bottom:15px;
}

.popup-footer button{
background:#007bff;
padding:10px 30px;
border:none;
color:white;
border-radius:5px;
}
</style>

</head>

<body>

<h2 class="main-title">Enter Health Details</h2>

<div class="container">

<div class="grid">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1684/1684375.png">
<input type="number" id="temp" placeholder="Enter Temperature">
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
<input type="number" id="heart" placeholder="Enter Heart Rate">
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">
<input type="number" id="sleep" placeholder="Enter Sleep Hours">
</div>

<div class="card full">
<img src="https://cdn-icons-png.flaticon.com/512/2966/2966480.png">
<input type="number" id="fatigue" placeholder="Enter Fatigue Level">
</div>

</div>

<button onclick="checkHealth()">Check</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-header">⚠ HEALTH ALERT</div>
<div class="popup-body" id="popupContent"></div>
<div class="popup-footer">
<button onclick="goToResult()">OK</button>
</div>
</div>

<script>

function checkHealth(){

let temp = parseFloat(document.getElementById("temp").value);
let heart = parseInt(document.getElementById("heart").value);
let sleep = parseFloat(document.getElementById("sleep").value);
let fatigue = parseInt(document.getElementById("fatigue").value);

// VALIDATION
if(isNaN(temp) || isNaN(heart) || isNaN(sleep) || isNaN(fatigue)){
alert("Please fill all fields correctly");
return;
}

// ✅ FIXED USER ID HANDLING
let userId = localStorage.getItem("userId");

if(!userId){
alert("User not logged in");
return;
}

fetch("http://localhost:8080/api/health/save",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
temperature: temp,
heartRate: heart,
sleepHours: sleep,
fatigueLevel: fatigue,
userId: parseInt(userId)   // ✅ FIXED
})
})
.then(res=>res.text())
.then(status=>{

console.log("Status from backend:", status);

localStorage.setItem("status", status);

// ✅ FIXED STATUS CHECK
let cleanStatus = status.trim().toLowerCase();

let message = "";

if(cleanStatus === "normal"){
message = "✅ Your health is normal";
}else{
message = `
⚠️ Warning! Abnormal health readings detected!<br><br>
• Temperature: ${temp}<br>
• Heart Rate: ${heart}
`;
}

document.getElementById("popupContent").innerHTML = message;
document.getElementById("popup").style.display = "block";

})
.catch(()=>{
alert("Server error (backend not working)");
});

}

function goToResult(){
window.location.href="result.html";
}

</script>

</body>
</html>
